services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: edux
      POSTGRES_PASSWORD: edux_dev
      POSTGRES_DB: edux
    volumes:
      - pgdata:/var/lib/postgresql/data

  ai:
    build: ./services/ai
    ports:
      - "8000:8000"
    env_file:
      - ./services/ai/.env
    depends_on:
      - db
    volumes:
      - ./services/ai:/app
      - chroma_data:/app/chroma_data

volumes:
  pgdata:
  chroma_data:
